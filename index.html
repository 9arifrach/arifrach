<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Auto-Loop</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --accent: #ff5b5b;
            --bg: #1a0a0a;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            transition: var(--transition); overflow: hidden; padding-top: 40px;
        }

        /* Mode Switcher ทรงแคปซูล */
        .mode-switcher {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px; border-radius: 15px; display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: auto;
        }

        .mode-btn {
            background: transparent; border: none; color: rgba(255, 255, 255, 0.4);
            padding: 10px 20px; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }

        .mode-btn.active { background: rgba(255, 255, 255, 0.1); color: white; }

        .material-symbols-outlined { font-size: 20px; vertical-align: middle; }

        /* Timer Box พร้อมแสง Glow */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%;
        }

        .timer-box {
            position: relative; width: 320px; height: 320px; margin-bottom: 30px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .progress-ring { position: absolute; transform: rotate(-90deg); }
        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            stroke: var(--accent); stroke-width: 8; stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .time-display { font-size: 85px; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .mode-label { font-size: 12px; letter-spacing: 4px; color: var(--accent); font-weight: bold; margin-top: -5px; }

        /* Session Dots */
        .session-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.15); border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent); }

        /* Controls */
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 20px; }
        .play-btn {
            width: 75px; height: 75px; border-radius: 50%; border: none;
            background: var(--accent); color: white; font-size: 32px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .play-btn:hover { transform: scale(1.1); }
        .sub-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.08); color: white; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        .total-time { margin-bottom: 40px; opacity: 0.3; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="mode-switcher">
        <button class="mode-btn active" id="btn-focus"><span class="material-symbols-outlined">psychology</span> Focus</button>
        <button class="mode-btn" id="btn-short"><span class="material-symbols-outlined">coffee</span> Short Break</button>
        <button class="mode-btn" id="btn-long"><span class="material-symbols-outlined">bed</span> Long Break</button>
    </div>

    <div class="main-content">
        <div class="timer-box">
            <svg class="progress-ring" width="320" height="320">
                <circle class="progress-ring__circle" fill="transparent" r="145" cx="160" cy="160"/>
            </svg>
            <h1 class="time-display" id="timer">25:00</h1>
            <div class="mode-label" id="modeName">FOCUS</div>
        </div>

        <div class="session-dots" id="dotContainer">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="controls">
            <button class="sub-btn" onclick="resetEverything()"><span class="material-symbols-outlined">restart_alt</span></button>
            <button class="play-btn" onclick="toggleTimer()"><span class="material-symbols-outlined" id="playIcon">play_arrow</span></button>
            <button class="sub-btn" onclick="skipStep()"><span class="material-symbols-outlined">skip_next</span></button>
        </div>

        <div class="total-time">
            TOTAL FOCUS: <span id="totalTimeDisplay">00:00:00</span>
        </div>
    </div>

    <audio id="bell"><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script src="b.js"></script>
</body>
</html>
